<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Art Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf7f5; }
        h1, h2, .serif-font { font-family: 'Playfair Display', serif; }
        .gradient-bg { background: linear-gradient(180deg, #fff5f5 0%, #faf7f5 100%); }
    </style>
</head>
<body class="text-stone-800 min-h-screen">

    <header class="gradient-bg text-center pt-24 pb-16 px-4 relative overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px] opacity-30"></div>
        <div class="relative z-10 max-w-2xl mx-auto">
            <span class="text-xs uppercase tracking-widest text-rose-400 font-medium mb-3 inline-block">Curated Collection</span>
            <h1 class="text-5xl md:text-6xl font-normal text-stone-950 tracking-wide mb-4">La Galerie d'Art</h1>
            <p class="text-stone-500 italic text-lg font-light">A beautiful space showcasing pure creativity and passion.</p>
            <div class="w-12 h-[1px] bg-rose-300 mx-auto mt-8"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="loading-state" class="text-center py-24">
            <div class="animate-pulse text-stone-400 italic font-light">Gathering the beautiful pieces...</div>
        </div>

        <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 hidden">
            </div>
    </main>

    <footer class="text-center py-12 border-t border-rose-100 mt-24 flex flex-col items-center gap-4">
        <p class="text-xs tracking-wider text-stone-400 uppercase">Made with love • All rights reserved</p>
        <a href="upload.html" class="text-xs text-stone-400 hover:text-rose-400 border border-stone-200 hover:border-rose-200 px-4 py-1.5 rounded-full transition-all duration-300">
            Studio Entrance Menu ✦
        </a>
    </footer>

    <script>
        const BACKEND_URL = "https://yourusername-yourspacename.hf.space"; 

        async function loadGallery() {
            const loadingEl = document.getElementById("loading-state");
            const gridEl = document.getElementById("gallery-grid");

            try {
                const response = await fetch(`${BACKEND_URL}/api/gallery`);
                const artworks = await response.json();
                
                loadingEl.classList.add("hidden");
                gridEl.classList.remove("hidden");

                if (artworks.length === 0) {
                    gridEl.innerHTML = `
                        <div class="col-span-full text-center py-12 text-stone-400 italic font-light">
                            The gallery is beautifully empty right now. Check back soon!
                        </div>`;
                    return;
                }

                gridEl.innerHTML = artworks.map(art => `
                    <div class="group flex flex-col bg-white p-4 rounded-3xl border border-rose-100/40 shadow-[0_8px_30px_rgb(253,244,245,0.6)] hover:shadow-[0_8px_35px_rgb(251,207,212,0.5)] transition-all duration-500 ease-out transform hover:-translate-y-1">
                        <div class="overflow-hidden rounded-2xl bg-stone-50 aspect-[4/5] relative">
                            <img src="${art.image_url}" alt="${art.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out">
                            <div class="absolute inset-0 bg-rose-950/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        </div>
                        <div class="pt-6 pb-2 px-2">
                            <h3 class="serif-font text-2xl font-normal text-stone-900 tracking-wide mb-1">${art.title}</h3>
                            <p class="text-stone-500 text-sm font-light leading-relaxed">${art.description || 'Untitled Collection Piece'}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error loading gallery:", err);
                loadingEl.innerHTML = `<div class="text-rose-400 font-light">Unable to load the gallery space at this moment.</div>`;
            }
        }
        window.onload = loadGallery;
    </script>
</body>
</html>
